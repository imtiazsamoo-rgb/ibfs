<script>
const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzkja68kzTrywDKPXwlIXpLnlTqI9fGO9IaEtMqpTzfhEBwYypO-6CUArDJ7GACUE-QFg/exec";

/* 🔥 SAFE FETCH (HTML error fix) */
async function postToScript(payload){
  const res = await fetch(APPS_SCRIPT_WEB_APP_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });

  const text = await res.text();

  // ❗ جيڪڏهن HTML اچي وڃي
  if(text.startsWith("<")){
    throw new Error("Apps Script not deployed properly or permission issue");
  }

  return JSON.parse(text);
}
</script>
