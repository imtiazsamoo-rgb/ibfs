<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBFS Lite</title>

<style>
body{font-family:Arial;margin:0;padding:20px;background:#f5f5f5}
.box{background:white;padding:20px;border-radius:10px;max-width:500px;margin:auto}
input,button{width:100%;padding:10px;margin-top:10px}
button{background:#2563eb;color:white;border:none}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzkja68kzTrywDKPXwlIXpLnlTqI9fGO9IaEtMqpTzfhEBwYypO-6CUArDJ7GACUE-QFg/exec";

async function login(){
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  const res = await fetch(URL,{
    method:"POST",
    body:JSON.stringify({action:"login",username,password})
  });

  const text = await res.text();

  if(text.startsWith("<")){
    document.getElementById("msg").innerText="❌ Deploy issue";
    return;
  }

  const data = JSON.parse(text);

  if(data.success){
    document.getElementById("msg").innerText="✅ Login OK";
  }else{
    document.getElementById("msg").innerText=data.message;
  }
}
</script>

</body>
</html>
