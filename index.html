<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@500&display=swap" rel="stylesheet">

<style>
body {
  font-family: Inter, sans-serif;
  background: #f8fafc;
  margin: 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

h2 {
  font-family: Poppins;
  text-align: center;
  color: #1e3a8a;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  background: #1e3a8a;
  color: white;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>School Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- FORM -->
<div class="card" id="formBox" style="display:none;">
<h2>Admission Form</h2>

<input id="grNo" placeholder="GR No">
<input id="studentName" placeholder="Student Name">
<input id="fatherName" placeholder="Father Name">
<input id="parentContact" placeholder="Mobile Number">

<button onclick="submitForm()">Submit</button>
</div>

</div>

<script>

let schoolCode = "";

const API_URL = "YOUR_APPS_SCRIPT_URL";

function login() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "login",
      username: document.getElementById("username").value,
      password: document.getElementById("password").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      schoolCode = data.schoolCode;
      document.getElementById("loginBox").style.display = "none";
      document.getElementById("formBox").style.display = "block";
    } else {
      alert("Login Failed");
    }
  });
}

function submitForm() {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "create",
      schoolCode: schoolCode,
      grNo: document.getElementById("grNo").value,
      studentName: document.getElementById("studentName").value,
      fatherName: document.getElementById("fatherName").value,
      parentContact: document.getElementById("parentContact").value
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
  });
}

</script>

</body>
</html>
