<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBFS Admission Portal 2026</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f7fb;
}

.container{
  max-width:500px;
  margin:60px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
  color:#1e3a8a;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  background:#1e3a8a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.message{
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  display:none;
}

.success{
  background:#d1fae5;
  color:#065f46;
}

.error{
  background:#fee2e2;
  color:#991b1b;
}

img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h2>Login</h2>
  <div id="loginMsg" class="message"></div>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div class="container" id="appBox" style="display:none;">
  <h2>Admission Form</h2>

  <div id="appMsg" class="message"></div>

  <input id="schoolCode" readonly>
  <input id="grNo" placeholder="GR No">
  <input id="studentName" placeholder="Student Name">
  <input id="fatherName" placeholder="Father Name">
  <input id="parentContact" placeholder="Mobile">

  <input type="file" id="photo">

  <img id="preview" style="display:none;">

  <button onclick="save()">Save</button>
  <button onclick="search()">Search</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzkja68kzTrywDKPXwlIXpLnlTqI9fGO9IaEtMqpTzfhEBwYypO-6CUArDJ7GACUE-QFg/exec";

let schoolCode = "";
let base64 = "";

function showMsg(id,type,text){
  let el=document.getElementById(id);
  el.style.display="block";
  el.className="message "+type;
  el.innerText=text;
}

function hideMsg(id){
  let el=document.getElementById(id);
  el.style.display="none";
}

function login(){
  hideMsg("loginMsg");

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"login",
      username:username.value,
      password:password.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.success){
      showMsg("loginMsg","error",d.message);
      return;
    }

    schoolCode=d.schoolCode;

    loginBox.style.display="none";
    appBox.style.display="block";

    document.getElementById("schoolCode").value=schoolCode;

  })
  .catch(e=>{
    showMsg("loginMsg","error","Backend error / Deploy issue");
  });
}

photo.onchange=async(e)=>{
  let file=e.target.files[0];
  let reader=new FileReader();
  reader.onload=()=>{
    base64=reader.result;
    preview.src=base64;
    preview.style.display="block";
  };
  reader.readAsDataURL(file);
};

function save(){
  hideMsg("appMsg");

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"create",
      schoolCode,
      grNo:grNo.value,
      studentName:studentName.value,
      fatherName:fatherName.value,
      parentContact:parentContact.value,
      studentPhotoBase64:base64
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.success){
      showMsg("appMsg","error",d.message);
      return;
    }

    showMsg("appMsg","success","Saved Successfully");

    setTimeout(()=>{
      grNo.value="";
      studentName.value="";
      fatherName.value="";
      parentContact.value="";
      preview.style.display="none";
    },1500);
  });
}

function search(){
  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"search",
      schoolCode,
      grNo:grNo.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(!d.success){
      showMsg("appMsg","error","Record not found");
      return;
    }

    let r=d.record;

    studentName.value=r.studentName;
    fatherName.value=r.fatherName;
    parentContact.value=r.parentContact;

    if(r.studentPhoto){
      preview.src=r.studentPhoto;
      preview.style.display="block";
    }

    showMsg("appMsg","success","Record Found");
  });
}
</script>

</body>
</html>
