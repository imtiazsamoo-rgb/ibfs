<!DOCTYPE html>
<html>
<body>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IBFS Lite Offline Admission</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f5f7fb;color:#1f2937}
.container{max-width:1000px;margin:auto;padding:12px}
.card{background:#fff;border-radius:16px;box-shadow:0 8px 22px rgba(0,0,0,.08);overflow:hidden}
.header{background:#2563eb;color:#fff;padding:18px}
.header h1{margin:0;font-size:22px}
.header p{margin:6px 0 0;font-size:14px}
.panel{padding:14px;border-bottom:1px solid #e5e7eb}
.box{background:#f8fafc;border:1px solid #e5e7eb;border-radius:14px;padding:14px}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.grid.two{grid-template-columns:1fr 1fr}}
label{font-weight:bold;font-size:14px}
input,select,button{font:inherit}
input,select{width:100%;padding:11px;border:1px solid #d1d5db;border-radius:10px;background:#fff}
input[readonly]{background:#f3f4f6}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.btn{border:0;border-radius:10px;padding:11px 14px;font-weight:bold;cursor:pointer}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#16a34a;color:#fff}
.btn-warning{background:#f59e0b;color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-secondary{background:#e5e7eb;color:#111827}
.status{display:none;margin-top:12px;padding:12px;border-radius:10px;font-weight:bold}
.status.show{display:block}
.info{background:#dbeafe;color:#1d4ed8}
.success{background:#dcfce7;color:#166534}
.error{background:#fee2e2;color:#991b1b}
.hidden{display:none!important}
.stats{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:760px){.stats{grid-template-columns:repeat(3,1fr)}}
.stat{padding:18px;border-radius:14px;color:#fff}
.total{background:#1d4ed8}.male{background:#16a34a}.female{background:#db2777}
.stat .num{font-size:32px;font-weight:bold}
.student-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px;display:grid;grid-template-columns:80px 1fr;gap:12px;margin-top:12px}
@media(min-width:760px){.student-card{grid-template-columns:80px 1fr 170px}}
.student-thumb{width:80px;height:100px;background:#e5e7eb;border-radius:10px;overflow:hidden}
.student-thumb img{width:100%;height:100%;object-fit:cover}
.small{font-size:14px;line-height:1.6;color:#4b5563}
.photo-wrap{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:760px){.photo-wrap{grid-template-columns:1fr 1fr}}
.preview-box,.crop-box{min-height:260px;border:1px dashed #cbd5e1;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#f3f4f6}
.preview-box img{width:220px;height:280px;object-fit:cover}
.crop-box img{max-width:100%}
.offline-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:12px;margin-top:12px}
.offline-row{border-top:1px solid #fed7aa;padding-top:8px;margin-top:8px;font-size:13px}
.badge{background:#e5e7eb;border-radius:999px;padding:7px 10px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="header">
<h1>Indus Bright Future School System</h1>
<p>Lite Offline Admission 2026</p>
</div>

<div class="panel" id="loginPanel">
<div class="box">
<h3>School Login</h3>
<div class="grid two">
<div><label>User Name</label><input id="username"></div>
<div><label>Password</label><input id="password" type="password"></div>
</div>
<div class="actions"><button class="btn btn-primary" onclick="loginUser()">Login</button></div>
<div id="loginStatus" class="status"></div>
</div>
</div>

<div id="appPanel" class="hidden">
<div class="panel">
<div class="actions">
<span class="badge">School Code: <span id="loggedInSchoolLabel"></span></span>
<button class="btn btn-success" onclick="newAdmission()">New Admission</button>
<button class="btn btn-primary" onclick="showSearch()">Search</button>
<button class="btn btn-warning" onclick="downloadSchoolPdf()">Download PDF</button>
<button class="btn btn-secondary" onclick="syncOfflineRecords()">Sync Pending</button>
<button class="btn btn-danger" onclick="logoutUser()">Logout</button>
</div>
<div id="mainStatus" class="status"></div>
</div>

<div class="panel" id="dashboardPanel">
<div class="stats">
<div class="stat total"><div>Total Students</div><div class="num" id="totalCount">0</div></div>
<div class="stat male"><div>Male</div><div class="num" id="maleCount">0</div></div>
<div class="stat female"><div>Female</div><div class="num" id="femaleCount">0</div></div>
</div>
<div class="offline-box">
<b>Offline Pending Records: <span id="pendingCount">0</span></b>
<div id="offlineList"></div>
</div>
</div>

<div class="panel hidden" id="searchPanel">
<div class="box">
<h3>Search Existing Record</h3>
<label>GR No</label>
<input id="searchGrNo" inputmode="numeric">
<div class="actions">
<button class="btn btn-primary" onclick="searchRecord()">Search</button>
<button class="btn btn-secondary" onclick="showDashboard()">Back</button>
</div>
<div id="searchStatus" class="small"></div>
<div id="searchResultCard"></div>
</div>
</div>

<form id="admissionForm" class="hidden" onsubmit="submitForm(event)">
<input type="hidden" id="mode" value="create">
<input type="hidden" id="originalSchoolCode">
<input type="hidden" id="originalGrNo">
<input type="hidden" id="existingPhotoUrl">

<div class="panel">
<h3 id="formTitle">New Admission</h3>
<div class="grid two">
<div><label>School Code</label><input id="schoolCode" readonly></div>
<div><label>GR No</label><input id="grNo" inputmode="numeric"></div>
<div><label>Student Name</label><input id="studentName"></div>
<div><label>Surname / Cast</label><input id="surnameCast"></div>
<div><label>B Form No</label><input id="bFormNo" inputmode="numeric" maxlength="13"></div>
<div><label>Father Name</label><input id="fatherName"></div>
<div><label>Father CNIC</label><input id="fatherCnic" inputmode="numeric" maxlength="13"></div>
<div><label>Mother Name</label><input id="motherName"></div>
<div><label>Mother CNIC</label><input id="motherCnic" inputmode="numeric" maxlength="13"></div>
<div><label>Gender</label><select id="gender"><option value="">Select</option><option>Male</option><option>Female</option></select></div>
<div><label>Date of Birth</label><input id="dob" type="date"></div>
<div><label>Admit in Class</label><select id="admitClass"><option value="">Select</option><option>Kachi</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option><option>VII</option><option>VIII</option></select></div>
<div><label>Current Class</label><select id="currentClass"><option value="">Select</option><option>Kachi</option><option>I</option><option>II</option><option>III</option><option>IV</option><option>V</option><option>VI</option><option>VII</option><option>VIII</option></select></div>
<div><label>Religion</label><select id="religion"><option value="">Select</option><option>Islam</option><option>Hindu</option><option>Christian</option></select></div>
<div><label>Birth Place</label><input id="birthPlace"></div>
<div><label>Date of Admission</label><input id="dateOfAdmission" type="date"></div>
<div><label>Shift</label><select id="shift"><option value="">Select</option><option>Morning</option><option>Evening</option></select></div>
<div><label>Student Photo</label><input id="photoInput" type="file" accept="image/*"></div>
</div>
</div>

<div class="panel">
<div class="photo-wrap">
<div class="box">
<b>Crop Photo</b>
<div class="crop-box" style="margin-top:10px"><img id="imageToCrop" class="hidden"><span id="cropText">Photo will appear here</span></div>
<div class="actions">
<button type="button" class="btn btn-secondary" onclick="rotatePhoto(-90)">Rotate Left</button>
<button type="button" class="btn btn-secondary" onclick="rotatePhoto(90)">Rotate Right</button>
<button type="button" class="btn btn-primary" onclick="applyCrop()">Apply Crop</button>
</div>
</div>
<div class="box">
<b>Preview</b>
<div class="preview-box" style="margin-top:10px"><img id="croppedPreview" class="hidden"><span id="previewText">No photo</span></div>
</div>
</div>
<div class="actions">
<button class="btn btn-success" type="submit" id="saveBtn">Save Admission</button>
<button class="btn btn-secondary" type="button" onclick="showDashboard()">Cancel</button>
</div>
</div>
</form>
</div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
<script>
const APPS_SCRIPT_WEB_APP_URL = "PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE";

let loggedInSchoolCode = "";
let cropper = null;
let croppedImageBase64 = "";

function digitsOnly(v){return String(v||"").replace(/\D/g,"")}
function clean(v){return String(v||"").trim()}
function show(el){document.getElementById(el).classList.remove("hidden")}
function hide(el){document.getElementById(el).classList.add("hidden")}
function status(id,msg,type="info"){const e=document.getElementById(id);e.textContent=msg;e.className="status show "+type}
function clearStatus(id){const e=document.getElementById(id);e.textContent="";e.className="status"}
async function postToScript(payload){
  const r=await fetch(APPS_SCRIPT_WEB_APP_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)});
  return await r.json();
}
function photoUrl(url){
  if(!url)return "";
  const m=String(url).match(/[?&]id=([^&]+)/)||String(url).match(/\/d\/([^/]+)/);
  return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`:url;
}

/* OFFLINE */
function offlineKey(){return "IBFS_OFFLINE_"+loggedInSchoolCode}
function getOffline(){return JSON.parse(localStorage.getItem(offlineKey())||"[]")}
function setOffline(a){localStorage.setItem(offlineKey(),JSON.stringify(a));renderOffline()}
function saveOffline(payload, reason){
  const arr=getOffline();
  const key=payload.schoolCode+"-"+payload.grNo;
  if(arr.some(x=>x.key===key)){status("mainStatus","This GR No is already pending offline.","error");return}
  arr.push({key,status:"pending",reason:reason||"",payload,createdAt:new Date().toLocaleString()});
  setOffline(arr);
  status("mainStatus","Internet slow/offline. Record saved in Pending Sync.","info");
}
function renderOffline(){
  const box=document.getElementById("offlineList");
  const arr=getOffline();
  document.getElementById("pendingCount").textContent=arr.length;
  box.innerHTML="";
  arr.slice().reverse().forEach(x=>{
    const p=x.payload;
    box.innerHTML+=`<div class="offline-row"><b>${p.studentName||""}</b><br>GR: ${p.grNo} | Status: ${x.status}${x.reason?` | ${x.reason}`:""}</div>`;
  });
}
async function syncOfflineRecords(){
  if(!loggedInSchoolCode)return;
  if(!navigator.onLine){status("mainStatus","Internet is not available.","error");return}
  let arr=getOffline();
  if(!arr.length){status("mainStatus","No pending records.","success");return}
  status("mainStatus","Sync started...","info");
  const remain=[];
  for(const item of arr){
    try{
      const res=await postToScript(item.payload);
      if(!res.success){
        item.status="failed";
        item.reason=res.message||"Sync failed";
        remain.push(item);
      }
    }catch(e){
      item.status="pending";
      item.reason="Network error";
      remain.push(item);
    }
  }
  setOffline(remain);
  await loadDashboard();
  status("mainStatus",remain.length?`${remain.length} record(s) still pending/failed.`:"All pending records synced.","success");
}
window.addEventListener("online",()=>{if(loggedInSchoolCode)syncOfflineRecords()});

/* LOGIN */
async function loginUser(){
  clearStatus("loginStatus");
  const username=clean(document.getElementById("username").value);
  const password=clean(document.getElementById("password").value);
  if(!username||!password){status("loginStatus","User name and password required.","error");return}
  try{
    const res=await postToScript({action:"login",username,password});
    if(!res.success)throw new Error(res.message||"Login failed");
    loggedInSchoolCode=clean(res.schoolCode);
    document.getElementById("loggedInSchoolLabel").textContent=loggedInSchoolCode;
    document.getElementById("schoolCode").value=loggedInSchoolCode;
    hide("loginPanel");show("appPanel");
    await loadDashboard();
    showDashboard();
  }catch(e){status("loginStatus",e.message,"error")}
}
function logoutUser(){location.reload()}

/* DASHBOARD */
async function loadDashboard(){
  try{
    const res=await postToScript({action:"dashboard",schoolCode:loggedInSchoolCode});
    if(!res.success)throw new Error(res.message||"Dashboard failed");
    document.getElementById("totalCount").textContent=res.total||0;
    document.getElementById("maleCount").textContent=res.male||0;
    document.getElementById("femaleCount").textContent=res.female||0;
  }catch(e){status("mainStatus",e.message,"error")}
  renderOffline();
}
function showDashboard(){
  show("dashboardPanel");hide("searchPanel");hide("admissionForm");clearStatus("mainStatus");renderOffline()
}
function showSearch(){
  hide("dashboardPanel");show("searchPanel");hide("admissionForm");
  document.getElementById("searchResultCard").innerHTML="";
  document.getElementById("searchStatus").textContent="";
}
function newAdmission(){
  resetForm();
  document.getElementById("mode").value="create";
  document.getElementById("formTitle").textContent="New Admission";
  document.getElementById("saveBtn").textContent="Save Admission";
  hide("dashboardPanel");hide("searchPanel");show("admissionForm");
}

/* SEARCH CARD */
async function searchRecord(){
  const grNo=digitsOnly(document.getElementById("searchGrNo").value);
  const card=document.getElementById("searchResultCard");
  const msg=document.getElementById("searchStatus");
  card.innerHTML="";
  if(!grNo){msg.textContent="Enter GR No";return}
  msg.textContent="Searching...";
  try{
    let res=null;
    if(navigator.onLine){
      try{res=await postToScript({action:"search",schoolCode:loggedInSchoolCode,grNo})}catch(e){}
    }
    if(!res||!res.success){
      const found=getOffline().find(x=>digitsOnly(x.payload.grNo)===grNo);
      if(found)res={success:true,record:found.payload,offline:true};
    }
    if(!res||!res.success)throw new Error((res&&res.message)||"No data found");
    renderSearchCard(res.record,!!res.offline);
    msg.textContent="";
  }catch(e){msg.textContent=e.message}
}
function renderSearchCard(r,isOffline){
  const img=r.studentPhotoBase64||photoUrl(r.studentPhoto||r.existingPhotoUrl);
  document.getElementById("searchResultCard").innerHTML=`
    <div class="student-card">
      <div class="student-thumb">${img?`<img src="${img}">`:""}</div>
      <div>
        <b>${r.studentName||""}</b>
        <div class="small">
          Father: ${r.fatherName||""}<br>
          GR No: ${r.grNo||""}<br>
          Class: ${r.currentClass||""}<br>
          ${isOffline?"Status: Offline Pending":""}
        </div>
      </div>
      <div class="actions" style="margin-top:0">
        <button class="btn btn-primary" onclick="openEdit('${r.grNo}',${isOffline})">Manage</button>
        <button class="btn btn-danger" onclick="deleteRecord('${r.grNo}',${isOffline})">Delete</button>
      </div>
    </div>`;
}
async function openEdit(grNo,isOffline){
  try{
    let rec=null;
    if(isOffline){
      const f=getOffline().find(x=>digitsOnly(x.payload.grNo)===digitsOnly(grNo));
      if(f)rec=f.payload;
    }else{
      const res=await postToScript({action:"search",schoolCode:loggedInSchoolCode,grNo});
      if(!res.success)throw new Error(res.message);
      rec=res.record;
    }
    fillForm(rec);
  }catch(e){status("mainStatus",e.message,"error")}
}
async function deleteRecord(grNo,isOffline){
  if(!confirm("Delete this record?"))return;
  try{
    if(isOffline){
      setOffline(getOffline().filter(x=>digitsOnly(x.payload.grNo)!==digitsOnly(grNo)));
    }else{
      const res=await postToScript({action:"delete",schoolCode:loggedInSchoolCode,grNo});
      if(!res.success)throw new Error(res.message);
      await loadDashboard();
    }
    document.getElementById("searchResultCard").innerHTML="";
    document.getElementById("searchStatus").textContent="Deleted.";
  }catch(e){document.getElementById("searchStatus").textContent=e.message}
}

/* FORM */
function resetForm(){
  document.getElementById("admissionForm").reset();
  document.getElementById("schoolCode").value=loggedInSchoolCode;
  document.getElementById("originalSchoolCode").value="";
  document.getElementById("originalGrNo").value="";
  document.getElementById("existingPhotoUrl").value="";
  croppedImageBase64="";
  if(cropper){cropper.destroy();cropper=null}
  document.getElementById("imageToCrop").src="";
  document.getElementById("imageToCrop").classList.add("hidden");
  document.getElementById("cropText").classList.remove("hidden");
  document.getElementById("croppedPreview").src="";
  document.getElementById("croppedPreview").classList.add("hidden");
  document.getElementById("previewText").classList.remove("hidden");
}
function fillForm(r){
  document.getElementById("mode").value="update";
  document.getElementById("formTitle").textContent="Edit / Update Record";
  document.getElementById("saveBtn").textContent="Update Record";
  document.getElementById("schoolCode").value=loggedInSchoolCode;
  const ids=["grNo","studentName","surnameCast","bFormNo","fatherName","fatherCnic","motherName","motherCnic","gender","dob","admitClass","currentClass","religion","birthPlace","dateOfAdmission","shift"];
  ids.forEach(id=>{document.getElementById(id).value=r[id]||""});
  document.getElementById("originalSchoolCode").value=r.schoolCode||loggedInSchoolCode;
  document.getElementById("originalGrNo").value=r.grNo||"";
  document.getElementById("existingPhotoUrl").value=r.studentPhoto||r.existingPhotoUrl||"";
  croppedImageBase64="";
  hide("dashboardPanel");hide("searchPanel");show("admissionForm");
}
function collectPayload(action){
  return {
    action,
    schoolCode:loggedInSchoolCode,
    grNo:digitsOnly(document.getElementById("grNo").value),
    studentName:clean(document.getElementById("studentName").value),
    surnameCast:clean(document.getElementById("surnameCast").value),
    bFormNo:digitsOnly(document.getElementById("bFormNo").value),
    fatherName:clean(document.getElementById("fatherName").value),
    fatherCnic:digitsOnly(document.getElementById("fatherCnic").value),
    motherName:clean(document.getElementById("motherName").value),
    motherCnic:digitsOnly(document.getElementById("motherCnic").value),
    gender:document.getElementById("gender").value,
    dob:document.getElementById("dob").value,
    admitClass:document.getElementById("admitClass").value,
    currentClass:document.getElementById("currentClass").value,
    religion:document.getElementById("religion").value,
    birthPlace:clean(document.getElementById("birthPlace").value),
    dateOfAdmission:document.getElementById("dateOfAdmission").value,
    shift:document.getElementById("shift").value,
    studentPhotoBase64:croppedImageBase64,
    existingPhotoUrl:document.getElementById("existingPhotoUrl").value,
    originalSchoolCode:document.getElementById("originalSchoolCode").value,
    originalGrNo:document.getElementById("originalGrNo").value
  }
}
function validatePayload(p){
  const req=["schoolCode","grNo","studentName","surnameCast","gender","dob","birthPlace","religion","admitClass","currentClass","dateOfAdmission","shift","fatherName","motherName"];
  for(const k of req){if(!p[k])return k+" is required."}
  if(!/^\d{13}$/.test(p.bFormNo))return "B Form No must be 13 digits.";
  if(!/^\d{13}$/.test(p.fatherCnic))return "Father CNIC must be 13 digits.";
  if(!/^\d{13}$/.test(p.motherCnic))return "Mother CNIC must be 13 digits.";
  if(p.action==="create"&&!p.studentPhotoBase64)return "Photo is required.";
  return "";
}
async function submitForm(e){
  e.preventDefault();
  const action=document.getElementById("mode").value==="update"?"update":"create";
  const p=collectPayload(action);
  const err=validatePayload(p);
  if(err){status("mainStatus",err,"error");return}
  if(action==="create"){
    const localDup=getOffline().some(x=>x.payload.schoolCode===p.schoolCode&&digitsOnly(x.payload.grNo)===p.grNo);
    if(localDup){status("mainStatus","This GR No is already pending offline.","error");return}
  }
  if(navigator.onLine){
    try{
      const res=await postToScript(p);
      if(res.success){
        status("mainStatus",res.message||"Saved successfully.","success");
        await loadDashboard();
        showDashboard();
        return;
      }
      if(res.duplicate)throw new Error(res.message);
      if(action==="create"){saveOffline(p,res.message);showDashboard();return}
      throw new Error(res.message||"Save failed");
    }catch(ex){
      if(action==="create"){saveOffline(p,ex.message);showDashboard();return}
      status("mainStatus",ex.message,"error");return;
    }
  }
  if(action==="create"){saveOffline(p,"No internet");showDashboard()}
  else status("mainStatus","Update needs internet. Please try when online.","error");
}

/* PHOTO */
document.getElementById("photoInput").addEventListener("change",async e=>{
  const file=e.target.files&&e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=document.getElementById("imageToCrop");
    img.src=ev.target.result; img.classList.remove("hidden"); document.getElementById("cropText").classList.add("hidden");
    if(cropper)cropper.destroy();
    cropper=new Cropper(img,{aspectRatio:3/4,viewMode:1,autoCropArea:1,background:false});
  };
  reader.readAsDataURL(file);
});
function rotatePhoto(deg){if(cropper)cropper.rotate(deg)}
function applyCrop(){
  if(!cropper){status("mainStatus","Upload photo first.","error");return}
  const canvas=cropper.getCroppedCanvas({width:300,height:400,imageSmoothingQuality:"high"});
  croppedImageBase64=canvas.toDataURL("image/jpeg",0.5);
  document.getElementById("croppedPreview").src=croppedImageBase64;
  document.getElementById("croppedPreview").classList.remove("hidden");
  document.getElementById("previewText").classList.add("hidden");
  status("mainStatus","Photo cropped.","success");
}

/* PDF */
function base64ToBlob(base64,type){
  const bin=atob(base64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type});
}
async function downloadSchoolPdf(){
  try{
    status("mainStatus","Preparing PDF...","info");
    const res=await postToScript({action:"downloadpdf",schoolCode:loggedInSchoolCode});
    if(!res.success)throw new Error(res.message||"PDF failed");
    if(!res.pdfBase64)throw new Error("PDF data not received");
    const blob=base64ToBlob(res.pdfBase64,"application/pdf");
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=res.fileName||"students.pdf";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    status("mainStatus","PDF downloaded.","success");
  }catch(e){status("mainStatus","PDF failed: "+e.message,"error")}
}
</script>
</body>
</html>

</body>
